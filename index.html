<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alex Mercer — Portfolio</title>
  <meta name="description" content="Alex Mercer — Software Engineering Student. I build elegant, performant software from beautiful UIs to robust backends." />

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Anime.js v3 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Syne', 'sans-serif'],
            mono:    ['DM Mono', 'monospace'],
            body:    ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    /* ═══════════════════════════════════════════
       GLOBAL RESETS & BASE
    ═══════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    :root {
      --bg:       #050b18;
      --blue:     #3b82f6;
      --blue-l:   #60a5fa;
      --violet:   #8b5cf6;
      --cyan:     #22d3ee;
      --green:    #34d399;
      --orange:   #fb923c;
      --pink:     #f472b6;
      --amber:    #f59e0b;
      --rose:     #f43f5e;
      --emerald:  #10b981;
      --glass-bg: rgba(13,28,58,0.52);
      --glass-bd: rgba(96,165,250,0.13);
    }

    body {
      background: var(--bg);
      font-family: 'Outfit', sans-serif;
      overflow-x: hidden;
    }

    /* ═══════════════════════════════════════════
       NAVBAR
    ═══════════════════════════════════════════ */
    #main-nav {
      background: rgba(5,11,24,0);
      backdrop-filter: blur(0px);
      -webkit-backdrop-filter: blur(0px);
      transition: background 0.5s ease, backdrop-filter 0.5s ease, -webkit-backdrop-filter 0.5s ease, box-shadow 0.5s ease;
      border-bottom: 1px solid transparent;
    }
    #main-nav.scrolled {
      background: rgba(5,11,24,0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom-color: rgba(96,165,250,0.08);
      box-shadow: 0 4px 30px rgba(0,0,0,0.3);
    }
    .nav-link {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(148,163,184,0.7);
      text-decoration: none;
      padding: 6px 0;
      position: relative;
      transition: color 0.3s ease;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: var(--blue-l);
      transform: scaleX(0);
      transform-origin: center;
      transition: transform 0.3s ease;
    }
    .nav-link:hover, .nav-link.active {
      color: #93c5fd;
    }
    .nav-link.active::after {
      transform: scaleX(1);
    }
    .nav-logo {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, #3b82f6, #6d28d9);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      color: #fff;
      box-shadow: 0 2px 12px rgba(59,130,246,0.3);
      flex-shrink: 0;
    }

    /* Mobile menu */
    #mobile-menu {
      position: fixed; inset: 0;
      background: rgba(5,11,24,0.97);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 100;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    #mobile-menu.open {
      opacity: 1;
      pointer-events: auto;
    }
    #mobile-menu .nav-link {
      font-size: 16px;
      letter-spacing: 0.2em;
    }
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      z-index: 110;
    }
    .hamburger span {
      display: block;
      width: 22px; height: 1.5px;
      background: rgba(148,163,184,0.8);
      transition: all 0.3s ease;
    }
    .hamburger.open span:nth-child(1) { transform: rotate(45deg) translateY(6.5px); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translateY(-6.5px); }
    @media (max-width: 768px) {
      .nav-links-desktop { display: none !important; }
      .hamburger { display: flex; }
    }

    /* ═══════════════════════════════════════════
       SECTION DIVIDER
    ═══════════════════════════════════════════ */
    .section-divider {
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(96,165,250,0.2), transparent);
    }

    /* ═══════════════════════════════════════════
       SHARED: Grid overlay
    ═══════════════════════════════════════════ */
    .grid-bg {
      background-image:
        linear-gradient(rgba(59,130,246,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.045) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0;
    }
    .grid-bg-static::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* Noise grain */
    .noise::after {
      content: '';
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.4;
      z-index: 0;
    }

    /* ═══════════════════════════════════════════
       SHARED: Ambient blobs
    ═══════════════════════════════════════════ */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      will-change: transform;
    }

    /* ═══════════════════════════════════════════
       SHARED: Section label
    ═══════════════════════════════════════════ */
    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(96,165,250,0.6);
    }

    /* ═══════════════════════════════════════════
       SHARED: Gradient heading text
    ═══════════════════════════════════════════ */
    .grad-text {
      background: linear-gradient(120deg, #e2e8f0 0%, #93c5fd 35%, #fff 55%, #a78bfa 80%, #e2e8f0 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 6s linear infinite;
    }
    @keyframes shimmer { from{background-position:-200% center} to{background-position:200% center} }

    /* ═══════════════════════════════════════════
       SHARED: Glass card
    ═══════════════════════════════════════════ */
    .glass {
      background: rgba(13,28,58,0.52);
      border: 1px solid rgba(96,165,250,0.13);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    /* ═══════════════════════════════════════════
       SHARED: Corner accents
    ═══════════════════════════════════════════ */
    .corner { position: absolute; width: 40px; height: 40px; opacity: 0; }
    .corner-tl { top:2rem; left:2rem; border-top:1px solid rgba(96,165,250,0.28); border-left:1px solid rgba(96,165,250,0.28); }
    .corner-tr { top:2rem; right:2rem; border-top:1px solid rgba(96,165,250,0.28); border-right:1px solid rgba(96,165,250,0.28); }
    .corner-bl { bottom:4rem; left:2rem; border-bottom:1px solid rgba(96,165,250,0.28); border-left:1px solid rgba(96,165,250,0.28); }
    .corner-br { bottom:4rem; right:2rem; border-bottom:1px solid rgba(96,165,250,0.28); border-right:1px solid rgba(96,165,250,0.28); }

    /* ═══════════════════════════════════════════
       SHARED: Entrance states
    ═══════════════════════════════════════════ */
    .anim-el    { opacity: 0; }
    .anim-up    { opacity: 0; transform: translateY(30px); }
    .anim-left  { opacity: 0; transform: translateX(-24px); }
    .anim-right { opacity: 0; transform: translateX(24px); }

    /* ═══════════════════════════════════════════
       HERO SECTION STYLES
    ═══════════════════════════════════════════ */
    #hero .blob { filter: blur(90px); opacity: 0; }
    #hero #blob1 { width:540px; height:540px; background:rgba(37,99,235,0.22); top:-12%; left:-8%; }
    #hero #blob2 { width:440px; height:440px; background:rgba(109,40,217,0.18); bottom:-8%; right:-6%; }
    #hero #blob3 { width:300px; height:300px; background:rgba(6,182,212,0.13); top:28%; right:14%; }
    #hero #blob4 { width:220px; height:220px; background:rgba(59,130,246,0.11); bottom:18%; left:12%; }

    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(96,165,250,0.07);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(0deg);
      pointer-events: none;
      opacity: 0;
    }
    #ring1 { width:500px; height:500px; }
    #ring2 { width:740px; height:740px; }
    @keyframes ringCW  { to { transform: translate(-50%,-50%) rotate(360deg); } }
    @keyframes ringCCW { to { transform: translate(-50%,-50%) rotate(-360deg); } }

    .glass-card {
      background: rgba(13,28,58,0.55);
      border: 1px solid rgba(96,165,250,0.14);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      will-change: transform;
    }

    .name-shimmer {
      background: linear-gradient(120deg, #e2e8f0 0%, #93c5fd 28%, #ffffff 50%, #a78bfa 72%, #e2e8f0 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
    }

    .btn-glow {
      position: relative;
      background: linear-gradient(135deg, #3b82f6 0%, #6d28d9 100%);
      border: 1px solid rgba(96,165,250,0.4);
      box-shadow: 0 0 22px rgba(59,130,246,0.3), inset 0 1px 0 rgba(255,255,255,0.15);
      cursor: pointer;
      will-change: transform, box-shadow;
    }
    .btn-ghost {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(96,165,250,0.2);
      cursor: pointer;
      will-change: transform;
    }

    .tech-tag {
      background: rgba(59,130,246,0.07);
      border: 1px solid rgba(96,165,250,0.15);
      cursor: default;
      will-change: transform;
      display: inline-block;
    }

    .social-link { display: inline-block; will-change: transform; }

    @keyframes statusPulse {
      0%,100%{ box-shadow:0 0 0 0 rgba(34,211,238,0.5); }
      50%    { box-shadow:0 0 0 5px rgba(34,211,238,0); }
    }
    .status-dot { animation: statusPulse 2.2s ease-in-out infinite; }

    .cursor::after {
      content:'|';
      color: #60a5fa;
      margin-left: 2px;
      animation: blink 1.1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .prog-bar { box-shadow: 0 0 10px rgba(59,130,246,0.5); }
    .stat-divider { width:1px; height:36px; background:rgba(96,165,250,0.15); }

    .scroll-line {
      width:1px; height:48px;
      background: linear-gradient(to bottom, rgba(96,165,250,0.6), transparent);
      margin: 0 auto;
      animation: scrollPulse 2.5s ease-in-out infinite;
    }
    @keyframes scrollPulse { 0%,100%{opacity:0.45} 50%{opacity:1} }

    #word-alex, #word-mercer { display:block; opacity:0; transform:translateY(44px); }
    .activity-item { opacity:0; transform:translateX(-14px); }

    /* ═══════════════════════════════════════════
       ABOUT SECTION STYLES
    ═══════════════════════════════════════════ */
    .glass-hover { transition: border-color 0.35s ease, box-shadow 0.35s ease, transform 0.35s ease; }
    .glass-hover:hover {
      border-color: rgba(96,165,250,0.28);
      box-shadow: 0 8px 40px rgba(59,130,246,0.10), 0 0 0 1px rgba(96,165,250,0.1);
      transform: translateY(-3px);
    }

    .timeline-track {
      position: absolute; left:19px; top:0; bottom:0;
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(96,165,250,0.25) 15%, rgba(96,165,250,0.25) 85%, transparent);
      transform-origin: top;
      transform: scaleY(0);
    }
    .timeline-dot {
      position: absolute; left:12px;
      width:15px; height:15px;
      border-radius: 50%;
      border: 1px solid rgba(96,165,250,0.4);
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 2;
    }
    .timeline-dot::after {
      content: '';
      width:6px; height:6px;
      border-radius: 50%;
      background: var(--blue-l);
      box-shadow: 0 0 8px rgba(96,165,250,0.8);
    }

    .journey-item { transition: all 0.32s ease; cursor: default; opacity:0; transform:translateX(-20px); }
    .journey-item:hover .journey-card { border-color: rgba(96,165,250,0.26); box-shadow: 0 4px 30px rgba(59,130,246,0.09); transform: translateX(4px); }
    .journey-item:hover .timeline-dot { border-color: rgba(96,165,250,0.7); box-shadow: 0 0 14px rgba(96,165,250,0.35); }
    .journey-card { transition: transform 0.32s ease, border-color 0.32s ease, box-shadow 0.32s ease; }

    .trait-badge {
      background: rgba(59,130,246,0.07);
      border: 1px solid rgba(96,165,250,0.15);
      transition: all 0.28s ease;
      cursor: default;
    }
    .trait-badge:hover { background: rgba(59,130,246,0.14); border-color: rgba(96,165,250,0.35); transform: translateY(-3px); box-shadow: 0 6px 20px rgba(59,130,246,0.12); }

    .edu-card { transition: all 0.32s ease; }
    .edu-card:hover { border-color: rgba(96,165,250,0.3); box-shadow: 0 8px 36px rgba(59,130,246,0.12); transform: translateY(-4px); }

    .bracket-tl { position:absolute; top:16px; left:16px; width:20px; height:20px; border-top:1px solid rgba(96,165,250,0.22); border-left:1px solid rgba(96,165,250,0.22); }
    .bracket-br { position:absolute; bottom:16px; right:16px; width:20px; height:20px; border-bottom:1px solid rgba(96,165,250,0.22); border-right:1px solid rgba(96,165,250,0.22); }

    @keyframes ringPulse {
      0%   { transform:scale(1);   opacity:0.5; }
      100% { transform:scale(1.5); opacity:0;   }
    }
    .avatar-ring {
      position:absolute; inset:-8px;
      border-radius:50%;
      border:1px solid rgba(96,165,250,0.35);
      animation: ringPulse 2.8s ease-out infinite;
    }
    .avatar-ring-2 {
      position:absolute; inset:-8px;
      border-radius:50%;
      border:1px solid rgba(167,139,250,0.25);
      animation: ringPulse 2.8s ease-out infinite 1.4s;
    }

    .hover-link { color: rgba(96,165,250,0.8); position:relative; text-decoration:none; }
    .hover-link::after {
      content:''; position:absolute; bottom:-1px; left:0; right:0;
      height:1px; background:var(--blue-l);
      transform:scaleX(0); transform-origin:left;
      transition:transform 0.3s ease;
    }
    .hover-link:hover::after { transform:scaleX(1); }

    .intro-para { opacity: 0; transform: translateY(18px); }
    .card-glow-orb { position:absolute; border-radius:50%; pointer-events:none; filter:blur(55px); opacity:0; will-change:transform,opacity; z-index:0; }
    #about .info-row { opacity:0; transform:translateX(-14px); }
    #about .cert-item { opacity:0; transform:translateX(-14px); }
    #about #header-line { width:0; }
    #about .edu-card { opacity:0; transform:translateY(22px); }
    #about .glass-hover { transition: none !important; }
    #about .edu-card { transition: none !important; }

    @keyframes greenStatusPulse {
      0%,100%{ box-shadow:0 0 0 0 rgba(74,222,128,0.5); }
      50%    { box-shadow:0 0 0 5px rgba(74,222,128,0); }
    }

    /* ═══════════════════════════════════════════
       SKILLS SECTION STYLES
    ═══════════════════════════════════════════ */
    .skill-card {
      position: relative;
      background: rgba(13,28,58,0.55);
      border: 1px solid rgba(96,165,250,0.12);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 20px;
      padding: 2rem 1.75rem 1.75rem;
      overflow: hidden;
      cursor: default;
      opacity: 0;
      transform: translateY(32px);
      will-change: transform, box-shadow, border-color;
      transition: none !important;
    }
    .skill-card::before {
      content: '';
      position: absolute; top:0; left:50%;
      transform: translateX(-50%);
      width: 60%; height: 1px;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.4s ease;
      background: var(--accent, #60a5fa);
    }
    .skill-card:hover::before { opacity: 1; }

    .card-java   { --accent: #f97316; --accent-dim: rgba(249,115,22,0.18); }
    .card-php    { --accent: #8b5cf6; --accent-dim: rgba(139,92,246,0.18); }
    .card-mysql  { --accent: #22d3ee; --accent-dim: rgba(34,211,238,0.18); }
    .card-tw     { --accent: #38bdf8; --accent-dim: rgba(56,189,248,0.18); }
    .card-js     { --accent: #facc15; --accent-dim: rgba(250,204,21,0.18); }
    .card-html   { --accent: #f472b6; --accent-dim: rgba(244,114,182,0.18); }

    .ring-track { fill:none; stroke:rgba(255,255,255,0.05); stroke-width:4; }
    .ring-fill  { fill:none; stroke-width:4; stroke-linecap:round; transform-origin:center; transform:rotate(-90deg); stroke-dasharray:226; stroke-dashoffset:226; filter:drop-shadow(0 0 6px var(--accent, #60a5fa)); }

    .skill-icon-wrap { position:relative; width:88px; height:88px; margin:0 auto 1.25rem; flex-shrink:0; }
    .skill-icon-wrap svg.ring-svg { position:absolute; inset:0; width:100%; height:100%; }
    .skill-icon-inner { position:absolute; inset:10px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.6rem; font-weight:700; transition:none !important; }

    .pct-label { font-family:'DM Mono',monospace; font-size:13px; font-weight:500; letter-spacing:0.04em; }

    .prof-bar-track { height:3px; border-radius:99px; background:rgba(255,255,255,0.06); overflow:hidden; margin-top:0.5rem; }
    .prof-bar-fill { height:100%; border-radius:99px; width:0%; box-shadow:0 0 8px var(--accent, #60a5fa); background:linear-gradient(to right, var(--accent, #60a5fa), rgba(255,255,255,0.5)); }

    .skill-tag { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.1em; padding:3px 9px; border-radius:6px; border:1px solid; opacity:0.75; transition:opacity 0.25s ease; display:inline-block; }
    .skill-card:hover .skill-tag { opacity:1; }

    .particle { position:absolute; width:3px; height:3px; border-radius:50%; pointer-events:none; opacity:0; }

    .cat-tab { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; padding:6px 16px; border-radius:99px; border:1px solid rgba(96,165,250,0.18); background:rgba(13,28,58,0.5); color:rgba(148,163,184,0.7); cursor:pointer; transition:none !important; }
    .cat-tab:hover, .cat-tab.active { background:rgba(59,130,246,0.14); border-color:rgba(96,165,250,0.4); color:#93c5fd; }

    #skills .bracket-tl, #skills .bracket-br { opacity:0; transform:scale(0.4); }
    .stat-chip { background:rgba(59,130,246,0.07); border:1px solid rgba(96,165,250,0.15); border-radius:12px; padding:0.75rem 1.25rem; text-align:center; opacity:0; transform:translateY(20px) scale(0.9); }

    #skills-header-line { width:0; transition:none; }
    #skills-heading span { display:block; opacity:0; transform:translateY(20px); }

    .skill-card .skill-icon-wrap { opacity:0; transform:scale(0.6); }
    .skill-card .mb-4 { opacity:0; transform:translateY(8px); }
    .skill-card .pt-3 { opacity:0; }
    .skill-card .skill-tag { opacity:0; transform:translateX(-8px) scale(0.85); }

    /* ═══════════════════════════════════════════
       PROJECTS SECTION STYLES
    ═══════════════════════════════════════════ */
    .project-card {
      position: relative;
      background: rgba(10, 20, 46, 0.6);
      border: 1px solid rgba(96,165,250,0.1);
      border-radius: 24px;
      overflow: hidden;
      cursor: pointer;
      opacity: 0;
      will-change: transform, box-shadow;
    }
    .card-bar { position:absolute; top:0; left:0; right:0; height:3px; border-radius:24px 24px 0 0; opacity:0.8; }
